# Shopify App Configuration
# This file configures your Shopify app for deployment and integration
# Learn more: https://shopify.dev/docs/apps/tools/cli/configuration

# Replace YOUR_SHOPIFY_API_KEY with your actual Shopify API key from Partners Dashboard
# To get your API key:
# 1. Go to https://partners.shopify.com
# 2. Select your app or create a new one
# 3. Copy the "Client ID" from the app credentials section

name = "Spiral"
client_id = "YOUR_SHOPIFY_API_KEY"
application_url = "https://joinspiral.app"
embedded = true

[auth]
redirect_urls = ["https://api.joinspiral.com/shopify/callback"]

[access_scopes]
scopes = "read_products,read_orders,write_discounts,read_fulfillments"
